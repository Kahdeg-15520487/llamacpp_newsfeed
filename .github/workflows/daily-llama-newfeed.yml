name: Daily Llama.cpp News Feed

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      lookback-days:
        description: "Days to look back for PRs"
        required: false
        default: "7"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate news report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npm run pipeline
        timeout-minutes: 20

      - name: Rebuild mdBook site
        run: bash scripts/rebuild-book.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/*.md book/src/*.md book/src/SUMMARY.md

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "📰 Daily llama.cpp news + site update — $TODAY"
            git push
            echo "✅ Committed and pushed."
          fi

      - name: Install mdBook
        env:
          MDBOOK_VERSION: "0.4.36"
        run: |
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin
          mdbook --version

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with mdBook
        run: mdbook build
        working-directory: book

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book/book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate-and-deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
