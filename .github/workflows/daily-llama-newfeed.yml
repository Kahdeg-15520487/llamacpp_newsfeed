name: Daily Llama.cpp News Feed

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      lookback-days:
        description: "Days to look back for PRs"
        required: false
        default: "7"
        type: string

jobs:
  generate-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate news report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npm run pipeline
        timeout-minutes: 20

      - name: Rebuild mdBook site
        run: bash scripts/rebuild-book.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/*.md book/src/*.md book/src/SUMMARY.md

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "📰 Daily llama.cpp news + site update — $TODAY"
            git push
            echo "✅ Committed and pushed."
          fi
